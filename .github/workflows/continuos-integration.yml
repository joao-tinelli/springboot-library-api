name: Continuous Integration

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: library
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Login to Docker Hub
      uses: docker/login-action@v4.1.0
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build Application e Docker Image (com Jib)
      # O package força o maven a compilar classes, rodar os testes e gerar os binários 
      run: mvn package jib:dockerBuild

    - name: Push to Container Registry
      run: |
        # Retag da imagem compilada pelo Jib para adicionar a versão única do github actions ($github.run_id) e latest
        docker tag joaotinelli/libraryapi:v2 ${{ secrets.DOCKER_USERNAME }}/libraryapi:${{ github.run_id }}
        docker tag joaotinelli/libraryapi:v2 ${{ secrets.DOCKER_USERNAME }}/libraryapi:latest
        
        # O push final no Docker Hub
        docker push ${{ secrets.DOCKER_USERNAME }}/libraryapi:${{ github.run_id }}
        docker push ${{ secrets.DOCKER_USERNAME }}/libraryapi:latest
