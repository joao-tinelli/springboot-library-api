server:
  port: 8888

spring:
  application:
    name: libraryapi

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/library}
    username: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # H2 precisa do dialeto explícito; Hibernate cria e derruba o schema a cada teste
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.format_sql: true

  # OAuth2 desabilitado nos testes:
  # - @WebMvcTest usa @WithMockUser ou SecurityMockMvcConfigurer
  # - variáveis GOOGLE_CLIENT_ID/SECRET não precisam existir no CI
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret

# Springdoc — mantém igual ao principal
springdoc:
  override-with-generic-response: false
